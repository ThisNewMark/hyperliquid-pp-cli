version: 2
project_name: hyperliquid-pp-cli
changelog:
  disable: true
builds:
  - id: hyperliquid-pp-cli
    main: ./cmd/hyperliquid-pp-cli
    binary: hyperliquid-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X hyperliquid-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: hyperliquid-pp-mcp
    main: ./cmd/hyperliquid-pp-mcp
    binary: hyperliquid-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: hyperliquid-pp-cli
    repository:
      owner: mark-s
      name: homebrew-tap
    homepage: "https://github.com/mark-s/hyperliquid-pp-cli"
    description: "Hyperliquid is an on-chain order-book L1 perpetuals + spot exchange. The public HTTP API exposes two physical..."
    install: |
      bin.install "hyperliquid-pp-cli"
      bin.install "hyperliquid-pp-mcp"
